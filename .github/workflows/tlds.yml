name: Refresh TLD data
description: Refresh TLD data powering dotcom.press/tld-wiki daily from https://github.com/case/iana-data

on:
  schedule:
    - cron: "0 6 * * *" # 6am UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest TLD data
        run: |
          curl -sSf https://raw.githubusercontent.com/case/iana-data/refs/heads/main/data/generated/tlds.json \
            -o src/components/TldWiki/tlds.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/components/TldWiki/tlds.json
          if git diff --cached --quiet; then
            echo "No changes to TLD data"
          else
            git commit -m "chore: sync TLD data from iana-data"
            git push
          fi
